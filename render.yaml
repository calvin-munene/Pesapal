services:
  - type: web
    name: payflow
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm install && npm run build && npm run db:push
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: PESAPAL_CONSUMER_KEY
        sync: false
      - key: PESAPAL_CONSUMER_SECRET
        sync: false
      - key: PESAPAL_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: payflow-db
          property: connectionString

databases:
  - name: payflow-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
